<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__content">
                <img src="./img/logo.png" alt="" class="header__logo">
                <button class="burger" id="burger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="header__list" id="headerList">
                    <li class="header__mark-home">Home</li>
                    <li class="header__mark-rooms">Rooms</li>
                    <li class="header__mark-gallery">Gallery</li>
                    <li  style="background: #a9825a; color: white;" class="header__mark-contact">Contact</li>
                </ul> 
            </div>
        </div>
    </header>
    <br><br><br>
    <section class="get">
        <h2 class="get__title">
            Get In Touch
        </h2>
        <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <iframe class="footer__map"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3503.2076330803125!2d74.57041711224339!3d42.72937587104077!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x389935b0e78e4359%3A0xfdf7c2ca2e9250ec!2sRetreat%20house%20%22House%20of%20Pilgrim%22!5e1!3m2!1sen!2skg!4v1775833616691!5m2!1sen!2skg"
                    width="600" height="450" allowfullscreen=""
                    title="Google Maps location of House of Pilgrim"></iframe>
                <div class="foter__boxes">

                    <div class="footer__boxes1">
                        <div class="footer__box">
                            <h3 class="footer__box-title">Address</h3>
                            <div class="footer__box-minibox">
                                <img src="./img/adress.png" alt="">
                                <div class="footer__box-numbers">
                                    <p class="footer__box-minibox-dec">+996 (550) 98 21 21</p>
                                    <p class="footer__box-minibox-dec">+996 (555) 52 08 58</p>
                                </div>
                            </div>
                        </div>

                        <div class="footer__box">
                            <h3 class="footer__box-title">Whatsapp</h3>
                            <div class="footer__box-minibox">
                                <img src="./img/whatsapp.png" alt="">
                                <div class="footer__box-numbers">
                                    <p class="footer__box-minibox-dec">+996 (550) 98 21 21</p>
                                    <p class="footer__box-minibox-dec">+996 (555) 52 08 58</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <br>
                    <div class="footer__boxes2">
                        <div class="footer__box">
                            <h3 class="footer__box-title">Telegram</h3>
                            <div class="footer__box-minibox">
                                <img src="./img/telegram.png" alt="">
                                <div class="footer__box-numbers">
                                    <p class="footer__box-minibox-dec">+996 (550) 98 21 21</p>
                                    <p class="footer__box-minibox-dec">+996 (555) 52 08 58</p>
                                </div>
                            </div>
                        </div>

                        <div class="footer__box">
                            <h3 class="footer__box-title">Сontacts</h3>
                            <div class="footer__box-minibox">
                                <img src="./img/phone.png" alt="">
                                <div class="footer__box-numbers">
                                    <p class="footer__box-minibox-dec">+996 (550) 98 21 21</p>
                                    <p class="footer__box-minibox-dec">+996 (555) 52 08 58</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    </section>
    <br><br><br><br><br><br>
</body>
<script>
     const homeBtn = document.querySelector('.header__mark-home');
    const logoBtn = document.querySelector('.header__logo');
    const roomsBtn = document.querySelector('.header__mark-rooms');
    const heroContactBtn = document.querySelector('.header__mark-gallery');

     heroContactBtn.addEventListener('click', () => {
        window.location.href = 'gallery.html';
    });

    roomsBtn.addEventListener('click', () => {
        window.location.href = 'rooms.html';
    });

    homeBtn.addEventListener('click', () => {
        window.location.href = 'index.html';
    });
    logoBtn.addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    function toggleMenu() {
    document.getElementById('burger').classList.toggle('active');
    document.getElementById('headerList').classList.toggle('open');
}

document.querySelectorAll('.header__list li').forEach(item => {
    item.addEventListener('click', () => {
        document.getElementById('burger').classList.remove('active');
        document.getElementById('headerList').classList.remove('open');
    });
});
</script>
</html>
